<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ec4899" />
      <stop offset="50%" stop-color="#f43f5e" />
      <stop offset="100%" stop-color="#eab308" />
    </linearGradient>
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fef08a" />
      <stop offset="100%" stop-color="#fbcfe8" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#ec4899" flood-opacity="0.35" />
    </filter>
  </defs>

  <!-- Background Card with Smooth Rounded Corners -->
  <rect x="16" y="16" width="480" height="480" rx="100" ry="100" fill="url(#bgGrad)" filter="url(#shadow)" />
  
  <!-- Subtle Inner Golden Border Accent -->
  <rect x="36" y="36" width="440" height="440" rx="80" ry="80" fill="none" stroke="url(#ringGrad)" stroke-width="8" opacity="0.8" />

  <!-- Shopping Basket Handle -->
  <path d="M 180 200 A 76 76 0 0 1 332 200" fill="none" stroke="#ffffff" stroke-width="24" stroke-linecap="round" />

  <!-- Shopping Basket Main Body -->
  <path d="M 130 200 L 382 200 C 392 200 400 208 398 218 L 368 360 C 366 372 356 380 344 380 L 168 380 C 156 380 146 372 144 360 L 114 218 C 112 208 120 200 130 200 Z" fill="#ffffff" />

  <!-- Basket Front Weave Stripes -->
  <line x1="190" y1="200" x2="205" y2="380" stroke="#ec4899" stroke-width="12" stroke-linecap="round" />
  <line x1="256" y1="200" x2="256" y2="380" stroke="#ec4899" stroke-width="12" stroke-linecap="round" />
  <line x1="322" y1="200" x2="307" y2="380" stroke="#ec4899" stroke-width="12" stroke-linecap="round" />
</svg>
